<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d946ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="200" height="200" rx="40" fill="url(#grad1)"/>
  <!-- Open book icon -->
  <path d="M100 60 C80 55 60 58 45 65 L45 140 C60 133 80 130 100 135 C120 130 140 133 155 140 L155 65 C140 58 120 55 100 60Z" fill="white" opacity="0.95"/>
  <!-- Book spine line -->
  <line x1="100" y1="60" x2="100" y2="135" stroke="url(#grad2)" stroke-width="3"/>
  <!-- Left page lines -->
  <line x1="60" y1="85" x2="93" y2="83" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="60" y1="97" x2="93" y2="95" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="60" y1="109" x2="93" y2="107" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Right page lines -->
  <line x1="107" y1="83" x2="140" y2="85" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="107" y1="95" x2="140" y2="97" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="107" y1="107" x2="140" y2="109" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Graduation cap -->
  <polygon points="100,145 130,158 100,171 70,158" fill="white" opacity="0.9"/>
  <rect x="97" y="140" width="6" height="10" rx="1" fill="white" opacity="0.9"/>
</svg>
